<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connecting...</title>
<style>
body{font-family:sans-serif;text-align:center;padding:40px;background:#fdf6f0;color:#281820}
h2{color:#6b3050}
.spinner{display:inline-block;width:30px;height:30px;border:3px solid rgba(107,48,80,.2);border-top-color:#6b3050;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<h2>✨ מתחברת לגוגל קלנדר...</h2>
<div class="spinner" id="spin"></div>
<p id="status">מעבדת את האישור...</p>

<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const scriptUrl = decodeURIComponent(params.get('state') || '');

if (!code || !scriptUrl) {
  document.getElementById('status').textContent = '❌ פרמטרים חסרים';
  document.getElementById('spin').style.display = 'none';
} else {
  // Redirect to Apps Script with the code — same origin, no CORS issue
  window.location.href = scriptUrl + '?action=oauth_callback&code=' + encodeURIComponent(code);
}
</script>
</body>
</html>
