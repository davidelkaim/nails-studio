<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connecting...</title>
<style>
body{font-family:sans-serif;text-align:center;padding:40px;background:#fdf6f0;color:#281820}
h2{color:#6b3050}
.spinner{display:inline-block;width:30px;height:30px;border:3px solid rgba(107,48,80,.2);border-top-color:#6b3050;border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<h2>✨ מתחברת לגוגל קלנדר...</h2>
<div class="spinner" id="spin"></div>
<p id="status">מעבדת את האישור...</p>

<script>
(async function() {
  const status = document.getElementById('status');
  const spin = document.getElementById('spin');
  
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const scriptUrl = decodeURIComponent(params.get('state') || '');
  
  if (!code || !scriptUrl) {
    status.textContent = '❌ פרמטרים חסרים';
    spin.style.display = 'none';
    return;
  }

  // Load Script URL via <script> tag — bypasses CORS completely
  // The Script will process the code server-side
  const callbackUrl = scriptUrl + '?action=oauth_callback&code=' + encodeURIComponent(code) + '&redirect_uri=' + encodeURIComponent(window.location.origin + window.location.pathname);
  
  // Use XMLHttpRequest with no-cors alternative: load as script tag
  const s = document.createElement('script');
  s.src = callbackUrl;
  s.onload = function() {
    spin.style.display = 'none';
    document.querySelector('h2').textContent = '✅ מחובר!';
    status.textContent = 'ניתן לסגור חלון זה';
  };
  s.onerror = function() {
    // Script tag blocked — try iframe approach
    const iframe = document.createElement('iframe');
    iframe.src = callbackUrl;
    iframe.style.display = 'none';
    iframe.onload = function() {
      spin.style.display = 'none';
      document.querySelector('h2').textContent = '✅ נשלח לשרת';
      status.textContent = 'ניתן לסגור חלון זה';
    };
    document.body.appendChild(iframe);
  };
  document.body.appendChild(s);
  
  // After 3 seconds assume success and show message
  setTimeout(function() {
    spin.style.display = 'none';
    document.querySelector('h2').textContent = '✅ הבקשה נשלחה!';
    status.textContent = 'ניתן לסגור חלון זה — חזרי לאפליקציה';
  }, 3000);
})();
</script>
</body>
</html>
